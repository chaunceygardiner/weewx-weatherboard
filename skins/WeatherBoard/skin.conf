# NOTE (paloaltoweather branch): this file carries John's SITE values
# (/gauge-data paths, slow-host, indoor board).  The master branch carries
# generic public defaults and has no indoor board.

[Extras]
    # Path of loop data file.  If not a full path,
    # it will be interpreted as relative to this skin's HTML_ROOT.
    loop_data_file = '/gauge-data/loop-data.txt'

    # Single-value observation files for the indoor board (index2).
    in_aqi_file = '/gauge-data/inAQI.txt'
    in_co2_file = '/gauge-data/inCO2.txt'
    in_temp_file = '/gauge-data/inTemp.txt'
    solar_array_file = '/gauge-data/solar-array.json'

    # Maximum age (seconds) of the indoor observation files above before
    # the board shows ?? placeholders for those readings.
    in_file_max_age = 120

    # Optional: a hostname where the indoor files sync less often (e.g. a
    # public mirror of the report).  When the page is served from that host,
    # in_file_slow_max_age is used instead of in_file_max_age.
    in_file_slow_host = 'www.paloaltoweather.com'
    in_file_slow_max_age = 360

    # Refresh rate is the rate at which the report should refresh with
    # the latest readings.  A good choice is the rate at which your
    # weather station's driver is feeding loop data.  Expressed in units
    # of seconds.  Default: 2 seconds.
    refresh_rate = 2

    # Fill in a suitable title/subtitle for the report.
    title = 'my-weather-website.com WeatherBoard&trade;'
    subtitle = 'Updated continuously.'

    # If you have a logo, specify it here.
    logo = ''

    # Choose your own password.  Without ?page_update_pwd='xxx'
    # at the end of the URL, auto updating will time out after
    # expiration_time hours.  Note: this password will be visible
    # to users looking at page source in their browser; it is a
    # keep-alive gate, not a secret.
    page_update_pwd = 'foobar'

    # Page expiration time is the number of hours the report will request
    # loop data and update.  After which, a mouse click will be needed
    # to start refreshing again.  Default 4 hours.
    expiration_time = 4

    # If you have a google analytics id, uncomment the following line
    # and fill in the ID.
    # googleAnalyticsId =
    # If you only want to use the ID on a certain host, uncomment the
    # following line and fill in the hostname.
    # analytics_host = www.example.com

    # If a PurpleAir sensor is set up and both weewx-purple and
    # purple-proxy are installed, or just weewx-purple is installed;
    # change the 'False' below to 'True'.
    # The weewx-purple extension can be found here:
    #    https://github.com/chaunceygardiner/weewx-purple
    # The purple-proxy server can be found here:
    #    https://github.com/chaunceygardiner/purple-proxy
    # It is preferable to install both weewx-purple and purple proxy
    # as the proxy returns averages over the archive period (as
    # opposed to one shot readings).
    show_purple = False

[Labels]
    [[Generic]]
        # Some specialized labels
        air_quality_index = Air Quality Index
        legend            = Legend
        rainToday         = Rain Today
        rain24h           = Rain 24h
        ten_min_max_gust  = 10m Gust
        time_of_day       = Time
        high_gust_today   = Today's High Gust

[CheetahGenerator]
    encoding = html_entities
    [[ToDate]]
        [[[index]]]
            template = index.html.tmpl
        [[[index2]]]
            template = index2.html.tmpl

[CopyGenerator]
    copy_once = favicon.ico, weatherboard.css, *.png
    copy_always = ,

[Generators]
        generator_list = weewx.cheetahgenerator.CheetahGenerator, weewx.reportengine.CopyGenerator
